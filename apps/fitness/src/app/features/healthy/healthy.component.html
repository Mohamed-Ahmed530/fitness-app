<section class="relative min-h-screen py-32 px-4 md:px-20 overflow-hidden flex flex-col items-center">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <img ngSrc="/images/healthy-bg.jpg" alt="Healthy Background" fill class="object-cover" priority>
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 w-full max-w-7xl mx-auto flex flex-col items-center">
        <div class="w-full h-fit flex justify-center items-center mb-6 text-center">
            <app-section-name 
                class="w-full block"
                sectionName="Healthy Nutritions" 
                sectionTitle="HEALTHY" 
                [centerAlignment]="true">
            </app-section-name>
        </div>

        <h3 class="text-center font-Baloo-Thambi-2 font-bold text-3xl md:text-5xl text-white mt-4 mb-8 max-w-3xl leading-tight">
            FUEL YOUR FITNESS JOURNEY WITH CUSTOMIZED <span class="text-main">MEAL PLANS</span> FOR YOU
        </h3>

        <!-- Tabs -->
        <div class="flex items-center justify-center gap-8 mb-12">
            @for (tab of displayCategories; track tab) {
                <button 
                    (click)="selectTab(tab)"
                    [class.bg-main]="selectedTab() === tab"
                    [class.text-white]="selectedTab() === tab"
                    [class.text-gray-300]="selectedTab() !== tab"
                    class="px-6 py-2 rounded-full font-Baloo-Thambi-2 font-bold text-lg transition-all duration-300 hover:text-white">
                    {{ tab }}
                </button>
            }
        </div>

        <!-- Meals Carousel -->
        @if (loading()) {
            <div class="flex justify-center items-center py-20">
                <i class="pi pi-spin pi-spinner text-main text-4xl"></i>
            </div>
        } @else {
            <div class="w-full relative z-20">
                <app-carousel [rowsPerColumn]="2" [carouselItems]="allExploreCards()"></app-carousel>
            </div>

            @if (meals().length === 0) {
                <div class="text-white text-center py-20">
                    <p class="text-xl">No meals found for this category.</p>
                </div>
            }
        }
    </div>
</section>
