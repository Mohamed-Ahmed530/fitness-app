<section class="bg-[url(/images/workout-background.jpg)] bg-cover bg-center relative px-21.5">
    <div class="relative z-2">
        <app-section-name sectionName="fitness class" sectionTitle="workouts"
            [centerAlignment]="true"></app-section-name>
    </div>
    <div class="bg-[#a5a5a5] dark:bg-gray-900 w-full h-70 absolute top-17 left-0 right-0 z-1">
    </div>
    <div class="relative z-1">
        <h3 class="text-center font-Baloo-Thambi-2 font-bold text-4xl text-gray-900 dark:text-gray-100 mb-8">Transform Your
            Body with Our <br> Dynamic <span class="text-main">Upcoming Workouts </span></h3>

            <!-- [rowsPerColumn]="1" for single row && [rowsPerColumn]="2" for multible row -->
            <app-carousel [rowsPerColumn]="1" [carouselItems]="workouts()"></app-carousel> 
    </div>



</section>
