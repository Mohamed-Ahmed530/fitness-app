<app-auth-header title="Welcome back" subtitle="Hey There"></app-auth-header>

<section class=" border border-gray-900 dark:border-gray-200 rounded-[50px] p-10 flex flex-col justify-center items-center gap-2">
    <h1 class="font-Baloo-Thambi-2 font-extrabold text-2xl text-gray-900 dark:text-white">Login</h1>

    <form class="flex flex-col justify-center items-center gap-2" [formGroup]="loginForm" (ngSubmit)="submitForm()">
        <!-- email -->
        <div>
            @let emailControl = loginForm.get("email");
            <app-input icontype="email" formControlName="email" id='email' type='email' placeholder="Email"></app-input>
            <app-error-message [nameControl]="emailControl"></app-error-message>
        </div>

        <!-- password -->
        <div class="mt-2">
            @let passwordControl = loginForm.get("password");
            <div class="relative">
                <app-input icontype="password" formControlName="password" id='password' [type]="togglePassword() ? 'text' : 'password'"
                placeholder="Password"></app-input>
            @if (togglePassword()) {
            <span (click)="togglePasswordVisibility()" class="absolute cursor-pointer top-1/2 -translate-y-1/2 right-3">
                <i class="pi pi-eye text-gray-900! dark:text-gray-200!"></i> </span>
            }@else {
            <span (click)="togglePasswordVisibility()" class="absolute cursor-pointer top-1/2 -translate-y-1/2 right-3">
                <i class="pi pi-eye-slash text-gray-900! dark:text-gray-200!"></i> </span>
            }
            </div>
            <app-error-message [nameControl]="passwordControl"></app-error-message>

        </div>
        <a routerLink="/auth/forgot-password" class="font-Baloo-Thambi-2 font-bold text-main ms-auto underline">Forget Password ?</a>
        <app-social-auth (selectProvider)="loginViaSocial($event)" ></app-social-auth>
        <app-button label="login" [loading]="loading()" [parentForm]="loginForm"  [styleClass]="'!text-black'" type='submit'></app-button>
    </form>
        <a routerLink="/auth/register" class="font-Baloo-Thambi-2 text-gray-900 dark:text-white m-auto capitalize">Dont have an account yet ? <span class="font-bold text-main underline">Register</span></a>


</section>
