<section class="flex flex-col items-center w-full my-4 gap-4">

    <div class="flex gap-5 items-center">
        <div class="grow border solid border-[#D3D3D3] w-20"></div>
        <span class="text-sm text-gray-300 font-Baloo-Thambi-2 font-normal leading-[1.4] text-center capitalize">Or</span>
        <div class="grow border solid border-[#D3D3D3] w-20"></div>
    </div>

    <div class="flex justify-center items-center gap-4">
        <button (click)="handleSocialClick('facebook')" class="social-btn">
            <i class="pi pi-facebook w-[16px] h-[16px]"></i>
        </button>
        <button (click)="handleSocialClick('google')" class="social-btn">
            <i class="pi pi-google w-[16px] h-[16px]"></i>
        </button>
        <button (click)="handleSocialClick('apple')" class="social-btn">
            <i class="pi pi-apple w-[16px] h-[16px]"></i>
        </button>
    </div>

</section>
