<div>
    <p-carousel [value]="groupedItems()" [numVisible]="3" [numScroll]="1" [responsiveOptions]="responsiveOptions"
        [showNavigators]="false">

        <ng-template let-chunk #item>
            <!-- Wrapper column for rows -->
            <div class="flex flex-col gap-8.25 justify-center items-center w-full px-2">

                <!-- Loop over individual rows inside this column chunk -->
                @for (i of chunk; track $index) {

                <app-explore-card [data]="{ title:i.name, image: i.image ,link:i.link }" [fallbackImage]="defaultImage()!"></app-explore-card>
                }

            </div>
        </ng-template>
    </p-carousel>
</div>
