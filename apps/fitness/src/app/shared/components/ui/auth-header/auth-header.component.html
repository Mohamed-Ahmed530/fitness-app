<header class="flex flex-col gap-4 py-2 px-4 items-center text-center">
    @if (subtitle()) {
        <span class="text-gray-900 dark:text-white text-2xl font-Baloo-Thambi-2 font-normal leading-[1.4] capitalize">
        {{ subtitle() }}
        </span>
    }

    <h1 class="text-gray-900 dark:text-white uppercase text-4xl font-Baloo-Thambi-2 font-extrabold tracking-wide leading-[1.4]">
        {{ title() }}
    </h1>
</header>
