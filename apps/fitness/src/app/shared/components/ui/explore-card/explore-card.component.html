<div class="relative group max-w-[350px] w-full min-h-[350px] rounded-xl overflow-hidden shadow-lg transition-transform duration-300 hover:-translate-y-1 hover:shadow-xl flex flex-col justify-end">
    <!-- Image section (absolute background) -->
    <div class="absolute inset-0 w-full h-full">
        <img [src]="data().image" [alt]="data().title" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" />
    </div>

    <!-- Content section (glassmorphism overlay at bottom) -->
    <div class="relative z-10 p-3 flex flex-col gap-3 bg-[#3A3A3C]/75 backdrop-blur-md border-t border-white/5">
        <h3 class="text-white font-inter font-bold text-[16px] tracking-wide uppercase">{{ data().title }}</h3>
        
        <a [routerLink]="data().link" class="flex items-center gap-2 w-fit group/btn cursor-pointer mt-1">
            <span class="text-main font-Rubik font-normal text-sm">Explore</span>
            <div class="bg-main w-5 h-5 rounded-full flex justify-center items-center group-hover/btn:-translate-y-0.5 group-hover/btn:translate-x-0.5 transition-transform duration-200">
                <img src="/icons/whiteArrow.png" alt="Arrow" class="w-2.5 h-2.5 rotate-[45deg]" />
            </div>
        </a>
    </div>
</div>
