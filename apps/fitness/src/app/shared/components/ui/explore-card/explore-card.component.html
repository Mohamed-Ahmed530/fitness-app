<div
    class="relative rounded-xl h-99.5 w-full group overflow-hidden cursor-pointer shadow-lg transition-transform duration-300 hover:-translate-y-1 hover:shadow-xl">
    <img [src]="data().image || fallbackImage()" [alt]="data().title" (error)="$event.target.src = fallbackImage()"
        class=" w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" alt="">
    <div
        class="absolute w-full h-25 bottom-0 right-0 left-0 z-10 p-3 flex flex-col gap-3 bg-[#FFFFFF80] dark:bg-[#3A3A3C]/75 backdrop-blur-md border-t border-white/5">
        <h3 class="text-gray-900 dark:text-white font-inter font-bold text-[16px] tracking-wide uppercase">
            {{ data().title }}</h3>

        <a [routerLink]="data().link" class="flex items-center gap-2 w-fit group/btn cursor-pointer mt-1">
            <span class="text-main font-Rubik font-normal text-sm">{{ data().actionLabel || 'Explore' }}</span>

            <div
                class="bg-main w-5 h-5 rounded-full flex justify-center items-center group-hover/btn:-translate-y-0.5 group-hover/btn:translate-x-0.5 group-hover/btn:rotate-45 transition-transform duration-200">
                <img src="/icons/grayArrow.png" alt="Arrow" class="w-2.5 h-2.5" />
            </div>
        </a>
    </div>
</div>
