<header class="w-[90%] mx-auto">
    <p-menubar [model]="items">
        <ng-template #start>
            <img src="/icons/logo.png" alt="Fitness Logo" class="w-[87px]" />
        </ng-template>

        <ng-template #item let-item>
            <a [routerLink]="item.routerLink" routerLinkActive="text-main" pRipple class="flex justify-center items-center px-4 py-3 cursor-pointer gap-2 text-black no-underline transition-colors duration-300 hover:text-main">
                <span class="font-Baloo-Thambi-2 font-bold text-xl">
                    {{ item.label }}
                </span>
            </a>
        </ng-template>

        <ng-template #end>
            <div class="flex items-center gap-2">

                @if (isLoggedIn()) {
                    <button class="w-[47px] h-[47px] bg-main rounded-full cursor-pointer">
                        <i class="pi pi-user"></i>
                    </button>
                }@else {
                    <div class="flex">
                        <app-action-button [text]="'Login'" [variant]="'filled'" [routerLink]="'/auth/login'"></app-action-button>
                        <app-action-button [text]="'Sign up'" [variant]="'outline'" [routerLink]="'/auth/register'"></app-action-button>
                    </div>
                }
            </div>
        </ng-template>
    </p-menubar>
</header>
